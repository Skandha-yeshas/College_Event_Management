<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - College Events</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      color: #333;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .page-title {
      font-weight: 800;
      font-size: 2.5rem;
      background: linear-gradient(90deg, #1e3c72 0%, #2a5298 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.5rem;
      text-shadow: 0px 4px 20px rgba(30, 60, 114, 0.2);
      text-align: center;
      animation: fadeInDown 0.8s ease-out;
    }
    .glass-container {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 20px;
      padding: 3rem;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
      animation: fadeInUp 0.8s ease-out;
    }
    .btn-custom {
      border: none;
      border-radius: 50px;
      padding: 12px 30px;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: all 0.3s ease;
      color: white;
      text-transform: uppercase;
      font-size: 0.9rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 100%;
      margin-top: 1rem;
    }
    .btn-submit {
      background: linear-gradient(45deg, #1e3c72, #2a5298);
    }
    .btn-submit:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(30, 60, 114, 0.4);
      color: white;
    }
    .back-link {
      color: #1e3c72;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      display: inline-block;
      margin-top: 1.5rem;
      transition: color 0.3s ease;
      text-align: center;
      width: 100%;
    }
    .back-link:hover {
      color: #2a5298;
    }
    
    /* Form Styling for Light Theme */
    .glass-form label {
      font-weight: 600;
      margin-bottom: 0.5rem;
      color: rgba(0, 0, 0, 0.8);
      font-size: 0.95rem;
      display: block;
    }
    .glass-form input {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(30, 60, 114, 0.2);
      color: #333;
      border-radius: 10px;
      padding: 0.75rem 1rem;
      width: 100%;
      transition: all 0.3s ease;
      display: block;
    }
    .glass-form input:focus {
      background: #ffffff;
      border-color: #2a5298;
      outline: none;
      box-shadow: 0 0 0 3px rgba(42, 82, 152, 0.2);
      color: #333;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .error-msg {
      color: #d9534f;
      background: rgba(217, 83, 79, 0.1);
      padding: 10px;
      border-radius: 10px;
      text-align: center;
      margin-bottom: 1rem;
      font-weight: 600;
    }
    
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container d-flex flex-column align-items-center my-5">
    <h1 class="page-title">Admin Access</h1>
    
    <div class="glass-container">
      {% if error %}
        <div class="error-msg">{{ error }}</div>
      {% endif %}
      
      <form method="POST" class="glass-form">
        {% csrf_token %}
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" name="username" id="username" required>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" name="password" id="password" required>
        </div>
        
        <button type="submit" class="btn btn-custom btn-submit">Login</button>
      </form>
      
      <a href="{% url 'home' %}" class="back-link">← Back to Dashboard</a>
    </div>
  </div>
</body>
</html>
