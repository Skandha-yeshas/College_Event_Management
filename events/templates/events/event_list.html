<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Events - College Events</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
      color: #333;
      min-height: 100vh;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 3rem;
    }
    .page-title {
      font-weight: 800;
      font-size: 2.5rem;
      background: linear-gradient(90deg, #1e3c72 0%, #2a5298 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.5rem;
      text-shadow: 0px 4px 20px rgba(30, 60, 114, 0.2);
      text-align: center;
      animation: fadeInDown 0.8s ease-out;
    }
    .glass-container {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      border-radius: 20px;
      padding: 3rem;
      max-width: 800px;
      width: 90%;
      box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
      animation: fadeInUp 0.8s ease-out;
    }
    .event-card {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(30, 60, 114, 0.1);
      border-radius: 15px;
      padding: 1.5rem;
      margin-bottom: 1rem;
      text-align: left;
      transition: transform 0.3s ease, background 0.3s ease;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }
    .event-card:hover {
      transform: scale(1.02);
      background: #ffffff;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }
    .event-date {
      color: #1e3c72;
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .empty-state {
      opacity: 0.6;
      font-style: italic;
      color: #333;
    }
    .back-link {
      color: #1e3c72;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      display: inline-block;
      margin-top: 1.5rem;
      transition: color 0.3s ease;
      text-align: center;
      width: 100%;
    }
    .back-link:hover {
      color: #2a5298;
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container d-flex flex-column align-items-center my-5">
    <h1 class="page-title">All Events</h1>
    
    <div class="glass-container">
      <div class="events-list">
        {% for event in events %}
          <div class="event-card">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <h5 class="mb-0 text-dark" style="font-weight: 600;">{{ event.name }}</h5>
              <span class="event-date">{{ event.date }}</span>
            </div>
            <p class="mb-1" style="opacity: 0.8; font-size: 0.95rem; color: #444;">{{ event.description }}</p>
            {% if event.location %}
            <p class="mb-0" style="font-size: 0.85rem; font-weight: 600; color: #1e3c72;">📍 {{ event.location }}</p>
            {% endif %}
          </div>
        {% empty %}
          <div class="event-card text-center py-4">
            <p class="empty-state mb-0">No events found.</p>
          </div>
        {% endfor %}
      </div>
      
      <a href="{% url 'home' %}" class="back-link">← Back to Dashboard</a>
    </div>
  </div>
</body>
</html>
